name: Eventos
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  detectar-evento:
    runs-on: ubuntu-latest
    steps:
      - name: Mostrar tipo de evento
        run: | 
          echo "El autor es: ${{ github.actor }}"

      - name: Mostrar tipo de evento
        run: | 
          echo "El evento que me activo fue: ${{ github.event_name }}"
